<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">

        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval' http://toyohide.work; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <title>Hello World</title>
    </head>
    <body>
        <div id="app-title">
            <span>投資信託購入履歴</span>
            <button id="pay-btn">💴</button>
        </div>
        <div id="status" style="color:#fff;padding:16px;font-size:14px;">起動中...</div>
        <ul id="list"></ul>

        <!-- リストダイアログ -->
        <div id="dialog-overlay">
            <div id="dialog">
                <div id="dialog-header"></div>
                <ul id="dialog-list"></ul>
            </div>
        </div>

        <!-- グラフダイアログ（リストの上に重ねる） -->
        <div id="graph-overlay">
            <div id="graph-dialog">
                <div id="graph-header"></div>
                <div id="graph-chart-area">
                    <div id="graph-scroll">
                        <svg id="chart"></svg>
                    </div>
                    <div class="mini-chart-wrap">
                        <svg id="mini-chart"></svg>
                    </div>
                </div>
            </div>
        </div>
        <!-- ペイダイアログ -->
        <div id="pay-overlay">
            <div id="pay-dialog">
                <div id="pay-header">
                    <span id="pay-header-title">月別支払い一覧</span>
                    <div class="pay-nav-btns">
                        <button class="pay-nav-btn" id="pay-scroll-top">↑</button>
                        <button class="pay-nav-btn" id="pay-scroll-bottom">↓</button>
                    </div>
                </div>
                <ul id="pay-list"></ul>
            </div>
        </div>

        <!-- ペイ詳細ダイアログ -->
        <div id="pay-detail-overlay">
            <div id="pay-detail-dialog">
                <div id="pay-detail-header"></div>
                <ul id="pay-detail-list"></ul>
            </div>
        </div>

        <script src="cordova.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
